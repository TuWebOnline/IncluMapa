<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <meta name="theme-color" content="#176b63" />

  <!-- CSP CORREGIDA -->
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self' https://unpkg.com;
      style-src 'self' 'unsafe-inline' https://unpkg.com;
      img-src 'self' data: blob: https://*.tile.openstreetmap.org https://upload.wikimedia.org https://commons.wikimedia.org https://unpkg.com;
      connect-src 'self' https://*.tile.openstreetmap.org;
      font-src 'self' https://unpkg.com data:;
      media-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      frame-ancestors 'none';
    "
  />

  <title>IncluMapa</title>

  <!-- PATHS RELATIVOS -->
  <link rel="manifest" href="./manifest.webmanifest" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

<section class="auth-screen" id="authScreen" aria-label="Acceso a IncluMapa">
  <div class="auth-card">

    <p class="eyebrow">Bienvenido</p>
    <h1>IncluMapa</h1>

    <p class="auth-copy">
      Entrá con una cuenta para usar Sacho Panza,
      añadir lugares y guardar tu historial.
    </p>

    <div
      class="auth-tabs"
      role="group"
      aria-label="Opciones de acceso"
    >
      <button
        class="auth-tab is-active"
        id="showLoginButton"
        type="button"
      >
        Iniciar sesión
      </button>

      <button
        class="auth-tab"
        id="showRegisterButton"
        type="button"
      >
        Registrarse
      </button>
    </div>

    <!-- LOGIN -->
    <form class="auth-form" id="loginForm">

      <label>
        Email
        <input
          id="loginEmail"
          type="email"
          autocomplete="email"
          placeholder="tu@email.com"
          required
        />
      </label>

      <label>
        Contraseña
        <input
          id="loginPassword"
          type="password"
          autocomplete="current-password"
          placeholder="Tu contraseña"
          required
        />
      </label>

      <button class="primary-button" type="submit">
        Iniciar sesión
      </button>
    </form>

    <!-- REGISTER -->
    <form class="auth-form" id="registerForm" hidden>

      <label>
        Nombre
        <input
          id="registerName"
          type="text"
          autocomplete="name"
          placeholder="Tu nombre"
          required
        />
      </label>

      <label>
        Email
        <input
          id="registerEmail"
          type="email"
          autocomplete="email"
          placeholder="tu@email.com"
          required
        />
      </label>

      <label>
        Contraseña
        <input
          id="registerPassword"
          type="password"
          autocomplete="new-password"
          placeholder="Mínimo 4 caracteres"
          minlength="4"
          required
        />
      </label>

      <div class="verification-box" id="verificationBox" hidden>

        <p>
          Te pediremos un código de 6 dígitos
          para validar tu Gmail.
        </p>

        <label>
          Código recibido

          <input
            id="registerCode"
            type="text"
            inputmode="numeric"
            maxlength="6"
            placeholder="123456"
          />
        </label>

        <p class="code-preview" id="codePreview"></p>
      </div>

      <button
        class="primary-button"
        id="registerSubmitButton"
        type="submit"
      >
        Enviar código
      </button>
    </form>

    <button
      class="secondary-button guest-button"
      id="guestButton"
      type="button"
    >
      Entrar como visitante
    </button>

    <p
      class="auth-message"
      id="authMessage"
      aria-live="polite"
    ></p>

  </div>
</section>

<main class="app-shell" aria-label="IncluMapa">

  <header class="topbar">

    <div>
      <p class="eyebrow">Mapa inclusivo</p>
      <h1>IncluMapa</h1>

      <p class="session-label" id="sessionLabel">
        Sin sesión
      </p>
    </div>

    <div class="topbar-actions">

      <button
        class="icon-button"
        id="logoutButton"
        type="button"
        aria-label="Cerrar sesión"
        title="Cerrar sesión"
      >
        <span aria-hidden="true">↩️</span>
      </button>

      <button
        class="icon-button"
        id="settingsButton"
        type="button"
        aria-label="Abrir configuración"
        title="Configuración"
      >
        <span aria-hidden="true">⚙️</span>
      </button>

      <button
        class="icon-button"
        id="locateButton"
        type="button"
        aria-label="Centrar ubicación"
        title="Mi ubicación"
      >
        <span aria-hidden="true">⌖</span>
      </button>

    </div>
  </header>

  <section class="map-area">

    <div id="map" class="map"></div>

    <div class="map-status" id="mapStatus">
      Cargando OpenStreetMap...
    </div>

  </section>

</main>

<!-- LEAFLET -->
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
></script>

<!-- APP -->
<script src="./app.js"></script>

</body>
</html>
